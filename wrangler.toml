name = "oracle"
main = "oracle/build/index.js"
compatibility_date = "2026-06-06"

[observability.logs]
enabled = false
invocation_logs = true

[build]
command = "cd oracle && worker-build --release"

[vars]
STELLAR_NETWORK = "testnet"
STELLAR_RPC_URL = "https://soroban-testnet.stellar.org"
ORACLE_CONTRACT_ID = "CBEMTV23SIJJBIST3V5HTMWHR4MHYGHNBIG4M26U4LGUJTWZXTFSVQEY"
PRICE_MOVEMENT_THRESHOLD = "10"

# Scheduled price-update trigger — runs every minute.
# Adjust the cron expression to match the desired update frequency, e.g.:
#   "*/5 * * * *"  → every 5 minutes
#   "*/30 * * * *" → every 30 minutes
# Local testing: wrangler dev --test-scheduled
[triggers]
crons = ["*/1 * * * *"]
