name = "oracle"
main = "oracle/build/index.js"
compatibility_date = "2026-05-12"

[build]
command = "cd oracle && worker-build --release"

[[kv_namespaces]]
binding = "ORACLE_KV"
id = "replace-with-production-kv-id"
preview_id = "replace-with-preview-kv-id"

[vars]
STELLAR_NETWORK = "testnet"
STELLAR_RPC_URL = "https://soroban-testnet.stellar.org"
ORACLE_CONTRACT_ID = "CAH5Z3RD6UMR6RIDXT4ZGOC5SMDCQRA2T3FO4FJSOYZGQPWS77ZGTXUO"

# Scheduled price-update trigger — runs every minute.
# Adjust the cron expression to match the desired update frequency, e.g.:
#   "*/5 * * * *"  → every 5 minutes
#   "*/30 * * * *" → every 30 minutes
# Local testing: wrangler dev --test-scheduled
[triggers]
crons = ["*/1 * * * *"]
